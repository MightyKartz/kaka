name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: Swift tests (Core + UI)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run swift test
        run: swift test

  python-tests:
    name: Python tests (runtime-kit, mock_bridge, ios, photo-pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Runtime Kit tests
        run: PYTHONPATH=runtime-kit:mock_bridge python -m pytest runtime-kit/tests -q
      - name: Mock bridge tests
        run: PYTHONPATH=mock_bridge:runtime-kit:photo-pack python -m pytest mock_bridge/tests -q
      - name: iOS source and photo pack tests
        run: python -m pytest ios/tests photo-pack/tests -q
