<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaka Mobile Flow</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --page: #e9eff1;
      --ink: #101819;
      --muted: #697477;
      --line: rgba(255, 255, 255, 0.18);
      --dark: #0b1011;
      --panel: rgba(15, 22, 24, 0.78);
      --panel-soft: rgba(255, 255, 255, 0.72);
      --mint: #8feee3;
      --mint-deep: #18b8a9;
      --photo: url("./assets/kaka-master-shot-clean-photo.png");
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background: linear-gradient(135deg, #f6f8f9 0%, var(--page) 56%, #dbe7e8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
      letter-spacing: 0;
    }

    .stage {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      place-items: center;
      padding: 28px;
    }

    .prototype {
      display: grid;
      grid-template-columns: auto minmax(190px, 230px);
      gap: 28px;
      align-items: center;
    }

    .phone {
      position: relative;
      width: 410px;
      aspect-ratio: 430 / 932;
      padding: 12px;
      border-radius: 52px;
      background: linear-gradient(145deg, #090b0c, #4a5254 48%, #070808);
      box-shadow: 0 28px 70px rgba(32, 45, 50, 0.24), inset 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .screen {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 41px;
      background: var(--dark);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .status {
      position: absolute;
      z-index: 40;
      top: 14px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-size: 13px;
      font-weight: 740;
    }

    .status.dark {
      color: #101819;
    }

    .island {
      position: absolute;
      z-index: 42;
      top: 12px;
      left: 50%;
      width: 112px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #020303;
    }

    .sensor-dot {
      position: absolute;
      top: 13px;
      right: 27px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #37db7b;
      box-shadow: 0 0 0 3px rgba(55, 219, 123, 0.08);
    }

    .ios-icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .signal {
      width: 17px;
      height: 10px;
      border-radius: 2px;
      background: linear-gradient(to right, currentColor 0 3px, transparent 3px 5px, currentColor 5px 8px, transparent 8px 10px, currentColor 10px 15px);
      opacity: 0.84;
    }

    .battery {
      width: 17px;
      height: 9px;
      border: 1.4px solid currentColor;
      border-radius: 3px;
      opacity: 0.84;
    }

    .home-indicator {
      position: absolute;
      z-index: 50;
      left: 50%;
      bottom: 10px;
      width: 136px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
    }

    .app-screen {
      position: absolute;
      inset: 0;
      display: none;
      height: 100%;
    }

    .app-screen.active {
      display: block;
    }

    .photo-bg {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(4, 7, 7, 0.04), rgba(4, 7, 7, 0.24)), var(--photo);
      background-position: center;
      background-size: cover;
    }

    .top-nav {
      position: absolute;
      z-index: 12;
      top: 56px;
      left: 22px;
      right: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      color: white;
      background: rgba(5, 8, 9, 0.34);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .icon-button.dark {
      color: #101819;
      background: rgba(255, 255, 255, 0.66);
      border-color: rgba(16, 24, 25, 0.08);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      color: #06201d;
      background: rgba(178, 255, 245, 0.9);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #18c888;
    }

    .connect {
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 255, 255, 0.28) 18% 19%, transparent 19% 82%, rgba(255, 255, 255, 0.24) 82% 83%, transparent 83%),
        linear-gradient(145deg, #eef4f5 0%, #d7e1e4 58%, #a9b8be 100%);
    }

    .connect::before {
      content: "";
      position: absolute;
      inset: -20px;
      background-image: var(--photo);
      background-position: center;
      background-size: cover;
      filter: blur(26px) saturate(0.6) brightness(1.18);
      opacity: 0.16;
    }

    .connect-content {
      position: relative;
      z-index: 4;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      padding: 88px 28px 34px;
      text-align: center;
    }

    .brand-word {
      color: rgba(255, 255, 255, 0.92);
      font-size: 36px;
      font-weight: 520;
      text-shadow: 0 14px 32px rgba(36, 48, 54, 0.16);
    }

    .connect h1 {
      margin: 32px auto 0;
      max-width: 100%;
      font-size: 26px;
      line-height: 1.16;
      font-weight: 800;
    }

    .connect-subtitle {
      margin: 12px auto 0;
      max-width: 25ch;
      color: rgba(16, 24, 25, 0.66);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 550;
    }

    .pair-card {
      align-self: center;
      padding: 23px 20px 20px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 24px 56px rgba(29, 46, 52, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(28px) saturate(150%);
      -webkit-backdrop-filter: blur(28px) saturate(150%);
    }

    .mac-shape {
      position: relative;
      width: 62px;
      height: 46px;
      margin: 0 auto 18px;
      border-radius: 10px;
      background: linear-gradient(#233134, #11191a);
    }

    .mac-shape::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -12px;
      width: 36px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #172325;
    }

    .pair-card h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
    }

    .trust-line {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
      color: #0d6d62;
      font-size: 13px;
      font-weight: 760;
    }

    .primary {
      width: 100%;
      min-height: 56px;
      margin-top: 24px;
      border: 0;
      border-radius: 18px;
      color: #06201d;
      background: linear-gradient(135deg, #b8fff5, var(--mint));
      box-shadow: 0 18px 36px rgba(24, 184, 169, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.72);
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .connect-footer {
      display: grid;
      gap: 14px;
      color: rgba(16, 24, 25, 0.58);
      font-size: 12px;
      line-height: 1.35;
    }

    .text-button {
      border: 0;
      color: #273336;
      background: transparent;
      font-size: 15px;
      font-weight: 760;
      cursor: pointer;
    }

    .camera .photo-bg {
      filter: saturate(0.86) brightness(0.7) contrast(0.98);
    }

    .camera::after,
    .processing::after,
    .result::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 3;
      height: 255px;
      background: linear-gradient(180deg, rgba(11, 16, 17, 0), rgba(11, 16, 17, 0.9) 30%, #0b1011 100%);
      pointer-events: none;
    }

    .viewfinder {
      position: absolute;
      z-index: 4;
      inset: 108px 28px 230px;
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 8px;
      background:
        linear-gradient(to right, transparent 32.9%, rgba(255, 255, 255, 0.28) 33.1%, transparent 33.4%, transparent 66.2%, rgba(255, 255, 255, 0.28) 66.5%, transparent 66.8%),
        linear-gradient(to bottom, transparent 32.9%, rgba(255, 255, 255, 0.28) 33.1%, transparent 33.4%, transparent 66.2%, rgba(255, 255, 255, 0.28) 66.5%, transparent 66.8%);
    }

    .corner {
      position: absolute;
      z-index: 5;
      width: 26px;
      height: 26px;
      border-color: rgba(255, 255, 255, 0.82);
      border-style: solid;
    }

    .corner.tl {
      top: 94px;
      left: 28px;
      border-width: 2px 0 0 2px;
      border-top-left-radius: 4px;
    }

    .corner.tr {
      top: 94px;
      right: 28px;
      border-width: 2px 2px 0 0;
      border-top-right-radius: 4px;
    }

    .corner.bl {
      left: 28px;
      bottom: 215px;
      border-width: 0 0 2px 2px;
      border-bottom-left-radius: 4px;
    }

    .corner.br {
      right: 28px;
      bottom: 215px;
      border-width: 0 2px 2px 0;
      border-bottom-right-radius: 4px;
    }

    .shot-title {
      position: absolute;
      z-index: 8;
      top: 105px;
      left: 32px;
      margin: 0;
      color: white;
      font-size: 29px;
      line-height: 1;
      font-weight: 820;
      text-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
    }

    .agent-prompt {
      position: absolute;
      z-index: 8;
      left: 32px;
      right: 32px;
      bottom: 234px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 16px;
      color: white;
      background: rgba(6, 10, 11, 0.42);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .agent-prompt strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .agent-prompt span {
      display: block;
      margin-top: 3px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
    }

    .mini-action {
      min-height: 32px;
      padding: 0 11px;
      border: 0;
      border-radius: 999px;
      color: #06201d;
      background: var(--mint);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }

    .lens-row {
      position: absolute;
      z-index: 8;
      left: 50%;
      bottom: 206px;
      display: flex;
      gap: 8px;
      transform: translateX(-50%);
    }

    .lens-row span {
      min-width: 34px;
      padding: 8px 9px;
      border-radius: 999px;
      color: white;
      background: rgba(7, 10, 10, 0.52);
      font-size: 12px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .lens-row .selected {
      color: #06201d;
      background: rgba(143, 238, 227, 0.92);
    }

    .capture-tray,
    .result-tray,
    .process-card,
    .share-sheet {
      position: absolute;
      z-index: 12;
      left: 14px;
      right: 14px;
      bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(31, 39, 41, 0.86), rgba(12, 17, 18, 0.94));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 -18px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
    }

    .capture-tray {
      padding: 14px 13px 17px;
    }

    .scene-tabs,
    .variant-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
    }

    .variant-tabs {
      grid-template-columns: 1fr 1fr;
    }

    .scene-tabs button,
    .variant-tabs button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.76);
      background: transparent;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
    }

    .scene-tabs .active,
    .variant-tabs .active {
      color: #06201d;
      background: var(--mint);
    }

    .capture-controls {
      display: grid;
      grid-template-columns: 70px 1fr 70px;
      align-items: center;
      gap: 13px;
      margin-top: 15px;
    }

    .round-control {
      height: 66px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 3px;
      place-items: center;
      align-content: center;
      font-size: 11px;
      font-weight: 760;
      cursor: pointer;
    }

    .round-control .glyph {
      width: 24px;
      height: 20px;
      border: 2px solid currentColor;
      border-radius: 7px;
      position: relative;
    }

    .round-control .glyph::after {
      content: "";
      position: absolute;
      top: 5px;
      left: 7px;
      width: 6px;
      height: 6px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .make-button {
      height: 88px;
      border: 0;
      border-radius: 999px;
      color: #06201d;
      background: var(--mint);
      box-shadow: 0 18px 38px rgba(24, 184, 169, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.68);
      font-size: 17px;
      font-weight: 830;
      white-space: nowrap;
      cursor: pointer;
    }

    .processing .photo-bg {
      filter: saturate(0.92) brightness(0.55) contrast(0.98);
    }

    .process-card {
      padding: 20px;
    }

    .process-card h2 {
      margin: 0;
      color: white;
      font-size: 21px;
      line-height: 1.2;
    }

    .progress-track {
      height: 7px;
      margin: 15px 0 18px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      width: 72%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), #ffffff);
    }

    .process-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .process-list li {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      line-height: 1.3;
    }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #06201d;
      background: var(--mint);
      font-size: 12px;
      font-weight: 900;
    }

    .result-photo {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .before,
    .after {
      position: absolute;
      inset: 0;
      background-image: var(--photo);
      background-position: center;
      background-size: cover;
    }

    .before {
      filter: saturate(0.5) brightness(0.48) contrast(0.9);
    }

    .after {
      clip-path: inset(0 0 0 49%);
      filter: saturate(1.24) brightness(1.16) contrast(1.16);
      transform: scale(1.06);
      transform-origin: center;
    }

    .divider {
      position: absolute;
      z-index: 2;
      top: 0;
      bottom: 258px;
      left: 49%;
      width: 2px;
      background: rgba(255, 255, 255, 0.9);
    }

    .divider::after {
      content: "";
      position: absolute;
      top: 51%;
      left: 50%;
      width: 42px;
      height: 42px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.93);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
    }

    .result-title {
      position: absolute;
      z-index: 8;
      top: 70px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }

    .result-title h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1;
      font-weight: 830;
    }

    .photo-label {
      position: absolute;
      z-index: 8;
      top: 118px;
      padding: 8px 11px;
      border-radius: 12px;
      color: white;
      background: rgba(8, 12, 13, 0.46);
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .photo-label.left {
      left: 24px;
    }

    .photo-label.right {
      right: 24px;
      color: #06201d;
      background: var(--mint);
    }

    .crop-suggestion {
      position: absolute;
      z-index: 5;
      left: 43px;
      top: 170px;
      width: 165px;
      height: 206px;
      border: 1px solid rgba(143, 238, 227, 0.72);
      border-radius: 10px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.04);
    }

    .result-tray {
      padding: 14px 13px 16px;
    }

    .recipe-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 13px 0;
    }

    .recipe-row span {
      padding: 8px 10px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.86);
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 760;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .secondary-action,
    .share-action {
      height: 52px;
      border: 0;
      border-radius: 17px;
      font-size: 16px;
      font-weight: 830;
      cursor: pointer;
    }

    .secondary-action {
      color: white;
      background: rgba(255, 255, 255, 0.13);
    }

    .share-action {
      color: #06201d;
      background: var(--mint);
    }

    .share-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .share-strip button {
      min-height: 34px;
      border: 0;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.07);
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;
    }

    .settings {
      background: linear-gradient(180deg, #fbfcfc, #e8eff1);
    }

    .settings-content {
      height: 100%;
      padding: 74px 22px 28px;
      overflow: auto;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .settings-header h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 840;
    }

    .settings-card {
      padding: 15px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 18px 44px rgba(34, 47, 52, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.88);
    }

    .settings-card + .settings-card {
      margin-top: 10px;
    }

    .settings-card h2 {
      margin: 0 0 9px;
      font-size: 15px;
      line-height: 1.15;
    }

    .language-segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 5px;
      border-radius: 999px;
      background: #e8eef0;
    }

    .language-segment button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      color: #4f5a5d;
      background: transparent;
      font-weight: 800;
      cursor: pointer;
    }

    .language-segment button.is-active {
      color: #06201d;
      background: var(--mint);
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 0;
      border-top: 1px solid rgba(16, 24, 25, 0.1);
    }

    .settings-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .settings-row:last-child {
      padding-bottom: 0;
    }

    .settings-row strong {
      display: block;
      font-size: 15px;
      line-height: 1.2;
    }

    .settings-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .value {
      flex: 0 0 auto;
      padding: 8px 11px;
      border-radius: 999px;
      color: #0d3a34;
      background: rgba(143, 238, 227, 0.48);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .share-overlay {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: none;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    body[data-state="share"] .share-overlay {
      display: block;
    }

    .share-sheet {
      padding: 18px;
      color: white;
    }

    .share-sheet h2 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .share-sheet p {
      margin: 0 0 16px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 13px;
      line-height: 1.35;
    }

    .share-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .share-grid button {
      min-height: 68px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;
    }

    .side-panel {
      display: grid;
      gap: 14px;
    }

    .side-card {
      padding: 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 44px rgba(35, 50, 55, 0.09);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .side-card h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .state-list {
      display: grid;
      gap: 8px;
    }

    .state-list button {
      min-height: 40px;
      border: 0;
      border-radius: 14px;
      color: #273336;
      background: rgba(255, 255, 255, 0.62);
      font-weight: 780;
      cursor: pointer;
    }

    .state-list button.active {
      color: #06201d;
      background: var(--mint);
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 720px) {
      .stage {
        padding: 18px;
      }

      .prototype {
        display: block;
        width: min(100%, 386px);
      }

      .phone {
        width: 100%;
      }

      .side-panel {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="prototype" aria-label="Kaka mobile flow prototype">
      <div class="phone">
        <div class="screen">
          <div class="status" data-status><span>9:41</span><span class="ios-icons"><span class="signal"></span><span class="battery"></span></span></div>
          <div class="island"><span class="sensor-dot"></span></div>

          <section class="app-screen connect active" data-screen="connect">
            <div class="connect-content">
              <div class="brand-word">Kaka</div>
              <div>
                <h1 data-i18n="connectTitle"></h1>
                <p class="connect-subtitle" data-i18n="connectSubtitle"></p>
              </div>
              <div class="pair-card">
                <div class="mac-shape" aria-hidden="true"></div>
                <h2 data-i18n="runtimeName"></h2>
                <div class="trust-line"><span class="dot"></span><span data-i18n="trusted"></span></div>
                <button class="primary" type="button" data-go="capture" data-i18n="connectButton"></button>
              </div>
              <div class="connect-footer">
                <button class="text-button" type="button" data-i18n="scanCode"></button>
                <span data-i18n="privacyLine"></span>
              </div>
            </div>
          </section>

          <section class="app-screen camera" data-screen="capture">
            <div class="photo-bg"></div>
            <div class="top-nav">
              <button class="icon-button" type="button" aria-label="Flash">⌁</button>
              <span class="pill"><span class="dot"></span><span data-i18n="connectedPill"></span></span>
              <button class="icon-button" type="button" data-go="settings" aria-label="Settings">⚙</button>
            </div>
            <h1 class="shot-title" data-i18n="captureTitle"></h1>
            <div class="viewfinder"></div>
            <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
            <div class="agent-prompt">
              <div><strong data-i18n="agentTipTitle"></strong><span data-i18n="agentTipBody"></span></div>
              <button class="mini-action" type="button" data-i18n="applyTip"></button>
            </div>
            <div class="lens-row"><span>0.5</span><span class="selected">1x</span><span>2</span><span>5</span></div>
            <div class="capture-tray">
              <div class="scene-tabs">
                <button class="active" type="button" data-i18n="sceneNatural"></button>
                <button type="button" data-i18n="scenePortrait"></button>
                <button type="button" data-i18n="sceneProduct"></button>
                <button type="button" data-i18n="sceneSocial"></button>
              </div>
              <div class="capture-controls">
                <button class="round-control" type="button"><span class="glyph"></span><span data-i18n="camera"></span></button>
                <button class="make-button" type="button" data-process data-i18n="makeShot"></button>
                <button class="round-control" type="button"><span class="glyph"></span><span data-i18n="album"></span></button>
              </div>
            </div>
          </section>

          <section class="app-screen processing" data-screen="processing">
            <div class="photo-bg"></div>
            <div class="top-nav">
              <button class="icon-button" type="button" data-go="capture" aria-label="Back">‹</button>
              <span class="pill"><span class="dot"></span><span data-i18n="processingPill"></span></span>
              <button class="icon-button" type="button" data-go="settings" aria-label="Settings">⚙</button>
            </div>
            <div class="process-card">
              <h2 data-i18n="processingTitle"></h2>
              <div class="progress-track"><div class="progress-fill"></div></div>
              <ul class="process-list">
                <li><span class="check">✓</span><span data-i18n="processOne"></span></li>
                <li><span class="check">✓</span><span data-i18n="processTwo"></span></li>
                <li><span class="check">✓</span><span data-i18n="processThree"></span></li>
              </ul>
              <button class="primary" type="button" data-go="result" data-i18n="viewResult"></button>
            </div>
          </section>

          <section class="app-screen result" data-screen="result">
            <div class="result-photo">
              <div class="before"></div>
              <div class="after"></div>
              <div class="divider"></div>
              <div class="crop-suggestion"></div>
            </div>
            <div class="result-title">
              <button class="icon-button" type="button" data-go="capture" aria-label="Back">‹</button>
              <h1 data-i18n="resultTitle"></h1>
              <button class="icon-button" type="button" data-go="settings" aria-label="Settings">•••</button>
            </div>
            <span class="photo-label left" data-i18n="originalLabel"></span>
            <span class="photo-label right" data-i18n="masterLabel"></span>
            <div class="result-tray">
              <div class="variant-tabs"><button class="active" type="button" data-i18n="masterVariant"></button><button type="button" data-i18n="socialVariant"></button></div>
              <div class="recipe-row">
                <span data-i18n="recipeCrop"></span>
                <span data-i18n="recipeLight"></span>
                <span data-i18n="recipeColor"></span>
                <span data-i18n="recipeSubject"></span>
              </div>
              <div class="action-row">
                <button class="secondary-action" type="button" data-i18n="save"></button>
                <button class="share-action" type="button" data-go="share" data-i18n="share"></button>
              </div>
              <div class="share-strip">
                <button type="button" data-go="share" data-i18n="shareOne"></button>
                <button type="button" data-go="share" data-i18n="shareTwo"></button>
                <button type="button" data-go="share" data-i18n="shareThree"></button>
                <button type="button" data-go="share" data-i18n="shareFour"></button>
              </div>
            </div>
          </section>

          <section class="app-screen settings" data-screen="settings">
            <div class="settings-content">
              <div class="settings-header">
                <button class="icon-button dark" type="button" data-go="capture" aria-label="Back">‹</button>
                <h1 data-i18n="settingsTitle"></h1>
                <span class="value">Kaka</span>
              </div>
              <section class="settings-card">
                <h2 data-i18n="languageTitle"></h2>
                <div class="language-segment" aria-label="Language">
                  <button type="button" data-lang="zh" class="is-active" data-i18n="languageZh"></button>
                  <button type="button" data-lang="en" data-i18n="languageEn"></button>
                </div>
              </section>
              <section class="settings-card">
                <div class="settings-row">
                  <div><strong data-i18n="runtimeTitle"></strong><span data-i18n="runtimeDescription"></span></div>
                  <b class="value" data-i18n="runtimeValue"></b>
                </div>
                <div class="settings-row">
                  <div><strong data-i18n="privacyTitle"></strong><span data-i18n="privacyDescription"></span></div>
                  <b class="value" data-i18n="privacyValue"></b>
                </div>
                <div class="settings-row">
                  <div><strong data-i18n="defaultSceneTitle"></strong><span data-i18n="defaultSceneDescription"></span></div>
                  <b class="value" data-i18n="defaultSceneValue"></b>
                </div>
              </section>
            </div>
          </section>

          <div class="share-overlay">
            <div class="share-sheet">
              <h2 data-i18n="shareSheetTitle"></h2>
              <p data-i18n="shareSheetBody"></p>
              <div class="share-grid">
                <button type="button" data-i18n="shareOne"></button>
                <button type="button" data-i18n="shareTwo"></button>
                <button type="button" data-i18n="shareThree"></button>
                <button type="button" data-i18n="shareFour"></button>
              </div>
              <button class="primary" type="button" data-go="result" data-i18n="done"></button>
            </div>
          </div>

          <div class="home-indicator"></div>
        </div>
      </div>

      <aside class="side-panel">
        <section class="side-card">
          <h2 data-i18n="flowTitle"></h2>
          <div class="state-list">
            <button type="button" data-go="connect" data-state-button="connect" data-i18n="navConnect"></button>
            <button type="button" data-go="capture" data-state-button="capture" data-i18n="navCapture"></button>
            <button type="button" data-go="processing" data-state-button="processing" data-i18n="navProcessing"></button>
            <button type="button" data-go="result" data-state-button="result" data-i18n="navResult"></button>
            <button type="button" data-go="settings" data-state-button="settings" data-i18n="navSettings"></button>
          </div>
        </section>
        <section class="side-card">
          <h2 data-i18n="languageTitle"></h2>
          <div class="language-segment" aria-label="Language">
            <button type="button" data-lang="zh" class="is-active" data-i18n="languageZh"></button>
            <button type="button" data-lang="en" data-i18n="languageEn"></button>
          </div>
        </section>
        <p class="note" data-i18n="sideNote"></p>
      </aside>
    </section>
  </main>

  <script>
    const copy = {
      zh: {
        documentTitle: "Kaka 手机流程原型",
        connectTitle: "连接我的本机智能体",
        connectSubtitle: "发现附近运行时，确认信任后即可拍照成片。",
        runtimeName: "Kartz Mac",
        trusted: "在线 · 已信任",
        connectButton: "连接",
        scanCode: "扫描二维码",
        privacyLine: "照片和密钥留在你的设备与本机运行时",
        connectedPill: "已连接 · 本机",
        captureTitle: "大师成片",
        agentTipTitle: "智能体建议",
        agentTipBody: "主体偏低，适合 4:5 裁切并提亮暗部。",
        applyTip: "应用",
        sceneNatural: "自然",
        scenePortrait: "人像",
        sceneProduct: "产品",
        sceneSocial: "社交",
        camera: "拍照",
        makeShot: "一键成片",
        album: "相册",
        processingPill: "本机处理中",
        processingTitle: "智能体正在生成修图方案",
        processOne: "读取主体、天空和背景层次",
        processTwo: "输出构图、光线和色彩 recipe",
        processThree: "本机执行参数化修图",
        viewResult: "查看成片",
        resultTitle: "成片结果",
        originalLabel: "原图",
        masterLabel: "大师版",
        masterVariant: "大师版",
        socialVariant: "分享版",
        recipeCrop: "4:5 裁切",
        recipeLight: "提亮暗部",
        recipeColor: "校正色温",
        recipeSubject: "增强主体",
        save: "保存",
        share: "分享",
        shareOne: "微信",
        shareTwo: "朋友圈",
        shareThree: "小红书",
        shareFour: "更多",
        shareSheetTitle: "分享到",
        shareSheetBody: "输出分享版图片，保留原图和 recipe。",
        done: "完成",
        settingsTitle: "项目设置",
        languageTitle: "界面语言",
        languageZh: "中文",
        languageEn: "英文",
        runtimeTitle: "本机运行时",
        runtimeDescription: "当前连接和信任状态",
        runtimeValue: "已连接",
        privacyTitle: "隐私边界",
        privacyDescription: "模型调用与渲染在本机处理",
        privacyValue: "本地",
        defaultSceneTitle: "默认场景包",
        defaultSceneDescription: "拍照后优先使用的风格",
        defaultSceneValue: "自然",
        flowTitle: "流程状态",
        navConnect: "连接",
        navCapture: "拍摄",
        navProcessing: "处理中",
        navResult: "成片",
        navSettings: "设置",
        sideNote: "这是为后续 iOS 实装准备的单屏流程原型，状态按钮用于视觉 QA。"
      },
      en: {
        documentTitle: "Kaka Mobile Flow Prototype",
        connectTitle: "Connect My Local Agent",
        connectSubtitle: "Find a nearby runtime, confirm trust, then start shooting.",
        runtimeName: "Kartz Mac",
        trusted: "Online · Trusted",
        connectButton: "Connect",
        scanCode: "Scan Code",
        privacyLine: "Photos and secrets stay on your devices and local runtime",
        connectedPill: "Connected · Local Mac",
        captureTitle: "Master Shot",
        agentTipTitle: "Agent Suggestion",
        agentTipBody: "Subject is low. Use a 4:5 crop and lift shadows.",
        applyTip: "Apply",
        sceneNatural: "Natural",
        scenePortrait: "Portrait",
        sceneProduct: "Product",
        sceneSocial: "Social",
        camera: "Camera",
        makeShot: "Make Shot",
        album: "Library",
        processingPill: "Processing Locally",
        processingTitle: "Agent is building an edit recipe",
        processOne: "Reading subject, sky, and background depth",
        processTwo: "Writing crop, light, and color recipe",
        processThree: "Applying local parameter edits",
        viewResult: "View Result",
        resultTitle: "Final Shot",
        originalLabel: "Original",
        masterLabel: "Master",
        masterVariant: "Master",
        socialVariant: "Social",
        recipeCrop: "4:5 Crop",
        recipeLight: "Lift Shadows",
        recipeColor: "Tune Color",
        recipeSubject: "Boost Subject",
        save: "Save",
        share: "Share",
        shareOne: "WeChat",
        shareTwo: "Moments",
        shareThree: "RED",
        shareFour: "More",
        shareSheetTitle: "Share To",
        shareSheetBody: "Export the social version while keeping the original and recipe.",
        done: "Done",
        settingsTitle: "Project Settings",
        languageTitle: "Interface Language",
        languageZh: "Chinese",
        languageEn: "English",
        runtimeTitle: "Local Runtime",
        runtimeDescription: "Current pairing and trust",
        runtimeValue: "Connected",
        privacyTitle: "Privacy Boundary",
        privacyDescription: "Model calls and rendering stay local",
        privacyValue: "Local",
        defaultSceneTitle: "Default Scene Pack",
        defaultSceneDescription: "Preferred look after capture",
        defaultSceneValue: "Natural",
        flowTitle: "Flow State",
        navConnect: "Pairing",
        navCapture: "Capture",
        navProcessing: "Processing",
        navResult: "Result",
        navSettings: "Settings",
        sideNote: "Single-screen flow prototype for later iOS implementation. State buttons support visual QA."
      }
    };

    const screens = Array.from(document.querySelectorAll("[data-screen]"));
    const stateButtons = Array.from(document.querySelectorAll("[data-state-button]"));
    const textNodes = Array.from(document.querySelectorAll("[data-i18n]"));
    const languageButtons = Array.from(document.querySelectorAll("[data-lang]"));
    const status = document.querySelector("[data-status]");
    let currentBaseState = "connect";
    let currentLanguage = "zh";

    function setLanguage(language) {
      currentLanguage = copy[language] ? language : "zh";
      const dictionary = copy[currentLanguage];
      document.documentElement.lang = currentLanguage === "zh" ? "zh-Hans" : "en";
      textNodes.forEach((node) => {
        node.textContent = dictionary[node.dataset.i18n] || "";
      });
      languageButtons.forEach((button) => {
        const active = button.dataset.lang === currentLanguage;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", String(active));
      });
      document.title = dictionary.documentTitle;
      localStorage.setItem("kaka-mobile-language", currentLanguage);
    }

    function setState(state) {
      const nextState = state || "connect";
      const screenState = nextState === "share" ? "result" : nextState;
      if (screenState !== "share") {
        currentBaseState = screenState;
      }
      screens.forEach((screen) => {
        screen.classList.toggle("active", screen.dataset.screen === screenState);
      });
      document.body.dataset.state = nextState;
      stateButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.stateButton === screenState);
      });
      if (status) {
        status.classList.toggle("dark", screenState === "connect" || screenState === "settings");
      }
      const url = new URL(window.location.href);
      url.searchParams.set("state", nextState);
      url.searchParams.set("lang", currentLanguage);
      window.history.replaceState({}, "", url);
    }

    document.querySelectorAll("[data-go]").forEach((button) => {
      button.addEventListener("click", () => setState(button.dataset.go));
    });

    document.querySelectorAll("[data-process]").forEach((button) => {
      button.addEventListener("click", () => {
        setState("processing");
        window.setTimeout(() => {
          if (document.body.dataset.state === "processing") {
            setState("result");
          }
        }, 1200);
      });
    });

    languageButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.lang);
        setState(document.body.dataset.state || currentBaseState);
      });
    });

    const params = new URLSearchParams(window.location.search);
    setLanguage(params.get("lang") || localStorage.getItem("kaka-mobile-language") || "zh");
    setState(params.get("state") || "connect");
  </script>
</body>
</html>
